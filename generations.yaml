generations:
  - name: "First Generation (GA)"
    start_year: 2016
    end_year: 2019
    description: "The Audi Q2 is the brand's smallest SUV, introduced to target the growing urban compact crossover segment. Built on the Volkswagen Group MQB A1 platform (shared with the Mk7 Volkswagen Golf), it features distinctive styling with a polygon design theme and the option for contrasting C-pillar 'blades' in different colors. Despite its compact dimensions, the Q2 maintains Audi's premium interior quality with available Virtual Cockpit digital instruments and advanced infotainment systems. Engine options include three and four-cylinder TFSI petrol and TDI diesel units, with front-wheel drive standard and quattro all-wheel drive available on higher-powered variants. An electric Q2L e-tron variant was introduced in 2019 for the Chinese market, while the SQ2 performance variant launched in 2019. The Q2 is not sold in the United States or Canada."
  - name: "First Generation (GA) - 2020 Facelift"
    start_year: 2020
    end_year: null
    description: "The 2020 facelift refreshed the exterior design and updated the technology offerings of the Audi Q2 while maintaining the same Volkswagen Group MQB A1 platform. The facelift introduced updated styling with new headlight designs, refreshed grille, and refined bumper treatments. Interior updates included enhanced infotainment systems and revised trim options. The Q2 continued with the same engine lineup and transmission options. In February 2022, Audi confirmed that the Q2 will not receive a second generation and will be discontinued without a direct successor, making this the only generation of the model."
