    description: "The Audi Q2 is the brand's smallest SUV, introduced to target the growing urban compact crossover segment. Built on the Volkswagen Group MQB A1 platform (shared with the Mk7 Volkswagen Golf), it features distinctive styling with a polygon design theme and the option for contrasting C-pillar 'blades' in different colors. Despite its compact dimensions, the Q2 maintains Audi's premium interior quality with available Virtual Cockpit digital instruments and advanced infotainment systems. Engine options include three and four-cylinder TFSI petrol and TDI diesel units, with front-wheel drive standard and quattro all-wheel drive available on higher-powered variants. A facelift in 2020 refreshed the exterior design and updated the technology offerings. An electric Q2L e-tron variant was introduced in 2019 for the Chinese market, while the SQ2 performance variant launched in 2019. In February 2022, Audi confirmed that the Q2 will not receive a second generation and will be discontinued without a direct successor, making this the only generation of the model. The Q2 is not sold in the United States or Canada."
